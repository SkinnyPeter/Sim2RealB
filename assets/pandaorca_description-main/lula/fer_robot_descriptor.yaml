# Robot descriptor for the FER (Franka-like) 7-DOF arm.
# Used by the Lula IK solver in Isaac Sim.
#
# Based on the Franka Panda robot descriptor shipped with Isaac Sim,
# adapted for the FER arm (fer_joint* naming, fer_link* links).

api_version: 1.0

# Active joints for IK solving (7-DOF arm only).
# Hand joints are controlled separately and not part of the IK cspace.
cspace:
    - fer_joint1
    - fer_joint2
    - fer_joint3
    - fer_joint4
    - fer_joint5
    - fer_joint6
    - fer_joint7

root_link: base

# Default configuration (Franka home-ish pose)
default_q: [0.00, -1.3, 0.00, -2.87, 0.00, 2.00, 0.75]

acceleration_limits: [15.0, 7.5, 10.0, 12.5, 15.0, 20.0, 20.0]
jerk_limits: [7500.0, 3750.0, 5000.0, 6250.0, 7500.0, 10000.0, 10000.0]

# All non-cspace URDF joints are fixed at their default values.
# No finger joints on the FER arm itself; hand joints are handled separately.
cspace_to_urdf_rules: []
